name: Bug report
description: Report a reproducible problem in the public HexMind repository.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.
        Please include enough detail for us to reproduce it quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem.
      placeholder: The CLI crashes when listing prompts.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to trigger the issue.
      placeholder: |
        1. Install with pip install -e ".[dev]"
        2. Run hexmind prompts
        3. Observe the traceback
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The command should list sample prompt assets.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste a traceback, error output, or screenshots if available.
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - CLI
        - API
        - Web UI
        - Prompt assets
        - Documentation
    validations:
      required: true
